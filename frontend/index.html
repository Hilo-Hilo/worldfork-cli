<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WorldFork Workbench</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">WF</div>
          <div>
            <h1>WorldFork</h1>
            <p id="providerLine">Simulation workbench</p>
          </div>
        </div>

        <section class="panel compact">
          <div class="panel-head">
            <h2>Big Bangs</h2>
            <button id="refreshButton" class="icon-button" title="Refresh">R</button>
          </div>
          <div id="bigBangList" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Scenario Bank</h2>
          </div>
          <select id="scenarioSelect"></select>
          <button id="createScenarioButton" class="primary">Create From Scenario</button>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>New Big Bang</h2>
          </div>
          <form id="createForm" class="form">
            <input id="newName" name="name" placeholder="Name" required />
            <textarea id="newScenario" name="scenario" placeholder="Scenario text" rows="7" required></textarea>
            <div class="split">
              <input id="tickDuration" name="tickDuration" placeholder="Tick duration" />
              <input id="maxTicks" name="maxTicks" type="number" min="1" max="500" placeholder="Ticks" />
            </div>
            <label class="check-row">
              <input id="useInitializer" type="checkbox" checked />
              <span>Initializer agent</span>
            </label>
            <button class="primary" type="submit">Create</button>
          </form>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Workspace</p>
            <h2 id="workspaceTitle">No Big Bang selected</h2>
          </div>
          <div class="toolbar">
            <button id="startButton" title="Start selected Big Bang">Start</button>
            <button id="pauseButton" title="Pause selected Big Bang">Pause</button>
            <button id="resumeButton" title="Resume selected Big Bang">Resume</button>
            <button id="simulateButton" class="accent" title="Simulate the selected or root multiverse">Next Tick</button>
            <button id="runButton" class="accent" title="Run selected Big Bang until complete">Run</button>
            <button id="reportButton" title="Generate final report">Report</button>
          </div>
        </header>

        <section class="canvas-band">
          <div class="canvas-head">
            <div>
              <p class="eyebrow">Recursive Multiverse</p>
              <h3 id="canvasTitle">Timeline graph</h3>
            </div>
            <div id="summaryChips" class="chips"></div>
          </div>
          <div id="timelineCanvas" class="timeline-canvas"></div>
        </section>

        <section class="lower-grid">
          <div class="panel">
            <div class="panel-head">
              <h2>Activity</h2>
            </div>
            <div id="activityList" class="activity-list"></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <h2>Ticks</h2>
            </div>
            <div id="tickList" class="tick-list"></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <h2>Signals</h2>
            </div>
            <div id="signalList" class="signal-list"></div>
          </div>
        </section>
      </main>

      <aside class="inspector">
        <div class="panel inspector-panel">
          <div class="panel-head">
            <h2>Inspector</h2>
            <span id="inspectorType" class="pill">idle</span>
          </div>
          <div id="inspectorContent" class="inspector-content"></div>
        </div>
      </aside>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/static/app.js"></script>
  </body>
</html>
